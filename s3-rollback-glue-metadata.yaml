  S3BatchOpsDeleteFunction:
    Condition: WantRollbackOrDMRemoval
    Type: "AWS::Lambda::Function"
    Properties:
      Runtime: python3.13
      MemorySize: 256
      Timeout: 900
      Handler: "index.handler"
      Role: !GetAtt S3BatchOpsDeleteFunctionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import botocore.config
          from urllib.parse import unquote_plus
          from botocore.exceptions import ClientError
          client_config = botocore.config.Config(retries={'max_attempts': 10, 'mode': 'standard'})
          s3 = boto3.client('s3', config=client_config)
          def handler(event, context):
              results = {'invocationSchemaVersion': event['invocationSchemaVersion'],
                         'treatMissingKeysAs': 'PermanentFailure',
                         'invocationId': event['invocationId'], 'results': []}
              for task in event['tasks']:
                  task_id = task['taskId']
                  s3_bucket = task['s3Bucket']
                  s3_key = unquote_plus(task['s3Key'])
                  s3_version_id = task.get('s3VersionId', None)
                  result = {'taskId': task_id}
                  try:
                      if s3_version_id:
                          s3.delete_object(Bucket=s3_bucket, Key=s3_key, VersionId=s3_version_id)
                      else:
                          s3.delete_object(Bucket=s3_bucket, Key=s3_key, IfMatch='*')
                      result['resultCode'] = "Succeeded"
                      result['resultString'] = "Deleted"
                  except ClientError as e:
                      error_code = e.response['Error']['Code']
                      if error_code == 'NoSuchKey':
                          result['resultCode'] = "Succeeded"
                          result['resultString'] = "Not found."
                      elif error_code == 'AccessDenied':
                          result['resultCode'] = "PermanentFailure"
                          result['resultString'] = f"Access denied. RequestID = {e.response['ResponseMetadata']['RequestId']}."
                      else:
                          result['resultCode'] = "PermanentFailure"
                          result['resultString'] = f"{error_code} - {e.response['Error']['Message']}"
                  results['results'].append(result)
              return results

  S3BatchOpsDeleteFunctionRole:
    Condition: WantRollbackOrDMRemoval
    Type: "AWS::IAM::Role"
    Properties:
