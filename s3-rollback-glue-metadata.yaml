  # ============================================================
  # S3 Batch Operations functions and roles
  # ============================================================

  ManifestMaker:
    Type: "AWS::Lambda::Function"
    Properties:
      Runtime: python3.13
      MemorySize: 1024
      Timeout: 900
      Handler: "index.handler"
      Role: !GetAtt ManifestMakerRole.Arn
      Code:
        ZipFile: |
          import cfnresponse
          import concurrent.futures
          import time
          import uuid
          import boto3
          import boto3.session
          import botocore
          import botocore.config

          def combine(s3, bucket, prefix, keys):
              if len(keys) == 1:
                  return keys
              buffer = bytearray()
              key_count = 0
              new_names = []
              for k in keys:
                  key_count += 1
                  response = s3.get_object(Bucket=bucket, Key=k)
                  buffer.extend(response["Body"].read())
                  if len(buffer) >= 5*1024*1024:
                      new_names += [write_object(s3, bucket, prefix, buffer)]
                      buffer = bytearray()
                      key_count = 0
              if key_count == 1:
                  new_names += [k]
              elif key_count > 1:
                  new_names += [write_object(s3, bucket, prefix, buffer)]
              return new_names

          def write_object(s3, bucket, prefix, bytes):
              name = f"{prefix}{uuid.uuid4()}-{time.time()}.csv"
              s3.put_object(Bucket=bucket, Key=name, Body=bytes)
              return name

          def handler(event, context):
              if event["RequestType"] != "Create":
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              bucket = event["ResourceProperties"]["SourceBucket"]
              table_src = event["ResourceProperties"]["TableSource"]
              manifest_dst = event["ResourceProperties"]["ManifestDestination"]
              session = boto3.session.Session()
              s3 = session.client("s3")
              for t in event["ResourceProperties"]["Tables"]:
                  dst_key = f"{manifest_dst}{t}.csv"
                  prefix = f"{table_src}{t}_keys_table/"
                  src_keys = []
                  combine_keys = []
                  found = False
                  for p in s3.get_paginator("list_objects_v2").paginate(Bucket=bucket, Prefix=prefix):
                      for c in p.get("Contents", []):
                          found = True
                          if c["Size"] < 5*1024*1024:
                              combine_keys += [c["Key"]]
                          else:
                              src_keys += [c["Key"]]
                  if found:
                      try:
                          src_keys += combine(s3, bucket, "tmp/", combine_keys)
                          config = botocore.config.Config(max_pool_connections=int(len(src_keys)))
                          s3 = session.client("s3", config=config)
                          response = s3.create_multipart_upload(Bucket=bucket, Key=dst_key)
                          upload_id = response["UploadId"]
                          part = 1
                          futures = []
                          executor = concurrent.futures.ThreadPoolExecutor(max_workers=len(src_keys))
                          for key in src_keys:
                              futures += [executor.submit(upload_part, s3, bucket, dst_key, {"Bucket": bucket, "Key": key}, part, upload_id)]
                              part += 1
                          parts = []
                          for r in concurrent.futures.as_completed(futures):
                              parts += [r.result()]
                          executor.shutdown()
                          parts.sort(key=lambda e: e["PartNumber"])
                          s3.complete_multipart_upload(Bucket=bucket, Key=dst_key, MultipartUpload={"Parts": parts}, UploadId=upload_id)
                          waiter = s3.get_waiter('object_exists')
                          waiter.wait(Bucket=bucket, Key=dst_key, WaiterConfig={'Delay': 10, 'MaxAttempts': 60})
                      except botocore.exceptions.ClientError as e:
                          reason = f'S3 processing failed for table {t}: {e.response["Error"]["Code"]}: {e.response["Error"]["Message"]}'
                          cfnresponse.send(event, context, cfnresponse.FAILED, {}, None, False, reason)
                      except botocore.exceptions.WaiterError:
                          reason = f'Generating manifest for table {t} still not complete.'
                          cfnresponse.send(event, context, cfnresponse.FAILED, {}, None, False, reason)
                  else:
                      print(f"No source files found for table {t}.")
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Manifests": f"s3://{bucket}/{manifest_dst}"})

          def upload_part(s3, bucket, key, src, part, upload_id):
              response = s3.upload_part_copy(Bucket=bucket, Key=key, CopySource=src, PartNumber=part, UploadId=upload_id)
              return {"ETag": response["CopyPartResult"]["ETag"], "PartNumber": part}

  ManifestMakerRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
