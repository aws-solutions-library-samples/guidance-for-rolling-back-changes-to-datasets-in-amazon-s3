  KMSUpdateFunction:
    Type: AWS::Lambda::Function
    Condition: CreateKMSUpdate
    Properties:
      FunctionName: !Sub "${AWS::StackName}-KMSUpdate"
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt KMSUpdateFunctionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, urllib.request, boto3, traceback
          kms = boto3.client("kms")
          def _send(event, context, status, data, pid=None, reason=None):
              body = json.dumps({"Status": status, "Reason": reason or f"See {context.log_stream_name}",
                  "PhysicalResourceId": pid or context.log_stream_name, "StackId": event["StackId"],
                  "RequestId": event["RequestId"], "LogicalResourceId": event["LogicalResourceId"], "Data": data or {}}).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT", headers={"content-type": "", "content-length": str(len(body))})
              with urllib.request.urlopen(req) as r: r.read()
          def _sid(event):
              raw = f"{event.get('StackId','')}-{event.get('LogicalResourceId','')}"
              return ("AllowPrincipalUseOfKey_" + "".join(c if c.isalnum() else "_" for c in raw))[:200]
          def handler(event, context):
              pid = event.get("PhysicalResourceId") or f"{event['StackId']}/{event['LogicalResourceId']}"
              try:
                  props = event.get("ResourceProperties", {})
                  key_id, principal_arn = props["KeyId"], props["PrincipalArn"]
                  policy_name = props.get("PolicyName", "default")
                  sid = props.get("StatementSid") or _sid(event)
                  rt = event["RequestType"]
                  resp = kms.get_key_policy(KeyId=key_id, PolicyName=policy_name)
                  policy = json.loads(resp["Policy"])
                  if "Statement" not in policy: policy["Statement"] = []
                  if not isinstance(policy["Statement"], list): policy["Statement"] = [policy["Statement"]]
                  if rt in ["Create", "Update"]:
                      policy["Statement"] = [s for s in policy["Statement"] if not (isinstance(s, dict) and s.get("Sid") == sid)]
                      policy["Statement"].append({"Sid": sid, "Effect": "Allow", "Principal": {"AWS": principal_arn},
                          "Action": ["kms:Decrypt", "kms:GenerateDataKey", "kms:DescribeKey"], "Resource": "*"})
                      kms.put_key_policy(KeyId=key_id, PolicyName=policy_name, Policy=json.dumps(policy))
                      _send(event, context, "SUCCESS", {"StatementSid": sid}, pid)
                  elif rt == "Delete":
                      new_stmts = [s for s in policy["Statement"] if not (isinstance(s, dict) and s.get("Sid") == sid)]
                      if len(new_stmts) != len(policy["Statement"]):
                          policy["Statement"] = new_stmts
                          kms.put_key_policy(KeyId=key_id, PolicyName=policy_name, Policy=json.dumps(policy))
                      _send(event, context, "SUCCESS", {}, pid)
                  else:
                      _send(event, context, "FAILED", {}, pid, "Unknown RequestType")
              except Exception as e:
                  _send(event, context, "FAILED", {"Error": str(e)}, pid, traceback.format_exc()[:1024])

  KMSUpdateFunctionRole:
    Type: AWS::IAM::Role
    Condition: CreateKMSUpdate
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action: ["logs:CreateLogStream", "logs:PutLogEvents"]
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
        - !If
          - UseKmsUpdateKeyPolicy
          - PolicyName: kms
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: ["kms:DescribeKey", "kms:GetKeyPolicy", "kms:PutKeyPolicy"]
                  Resource: !Ref ExistingKmsKeyIdOrArn
          - !Ref AWS::NoValue

  KMSUpdate:
    Condition: CreateKMSUpdate
    Type: Custom::KMSUpdate
    Properties:
      ServiceToken: !GetAtt KMSUpdateFunction.Arn
      KeyId: !Ref ExistingKmsKeyIdOrArn
      PrincipalArn: !GetAtt MetadataFinderRole.Arn


  # ============================================================
  # Execution chain
  # ============================================================

  ExecuteCheckVersioning:
    Type: "Custom::ExecuteCheckVersioningFunction"
    Properties:
      ServiceTimeout: 60
      ServiceToken: !GetAtt CheckVersioning.Arn
      SourceBucket: !Ref BucketName
      DestinationBucket: !If [WantCopy, !Ref DestinationBucket, !Ref "AWS::NoValue"]

  ExecuteClean:
    Type: "Custom::ExecuteCleanerFunction"
    DependsOn:
      - ExecuteCheckVersioning
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt BucketCleaner.Arn
      Bucket: !Ref AthenaResultsBucket

  # Step 1: Discover S3 Metadata configuration
  ExecuteMetadataFinder:
    Type: "Custom::ExecuteMetadataFinderFunction"
    DependsOn:
      - ExecuteClean
    Properties:
      ServiceTimeout: 60
      ServiceToken: !GetAtt MetadataFinder.Arn
      Bucket: !Ref BucketName
      KmsKeyIdOrArn: !Ref ExistingKmsKeyIdOrArn


  # Step 2: Upload PySpark script to S3
  ExecuteSparkScriptUpload:
    Type: "Custom::ExecuteSparkScriptUploadFunction"
    DependsOn:
      - ExecuteClean
      - ExecuteMetadataFinder
    Properties:
      ServiceTimeout: 60
      ServiceToken: !GetAtt SparkScriptUploader.Arn
      Bucket: !Ref AthenaResultsBucket
      Key: "scripts/generate_pit_table.py"
      Script: !Sub
        - |
          import sys
          from awsglue.context import GlueContext
          from awsglue.job import Job
          from awsglue.utils import getResolvedOptions
          from pyspark.context import SparkContext
          from pyspark.sql import SparkSession
          from pyspark.sql import functions as F
          from pyspark.sql.window import Window

          args = getResolvedOptions(sys.argv, ["JOB_NAME", "REGION", "NAMESPACE",
              "INVENTORY_TABLE", "JOURNAL_TABLE", "OUTPUT_PATH", "PREFIX_FILTER"])

          glueContext = GlueContext(SparkContext.getOrCreate())
          job = Job(glueContext)
          job.init(args["JOB_NAME"], args)

          REGION = args["REGION"]
          NAMESPACE = args["NAMESPACE"]
          INVENTORY_TABLE = args["INVENTORY_TABLE"]
          JOURNAL_TABLE = args["JOURNAL_TABLE"]
          OUTPUT_PATH = args["OUTPUT_PATH"]
          PREFIX_FILTER = "" if args["PREFIX_FILTER"] == "NONE" else args["PREFIX_FILTER"]
          TABLE_BUCKET_ARN = f"arn:aws:s3tables:{REGION}:${AWS::AccountId}:bucket/aws-s3"

          spark = SparkSession.builder \
              .appName("s3-rollback-pit-table") \
              .config("spark.sql.extensions", "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions") \
              .config("spark.sql.catalog.aws_s3", "org.apache.iceberg.spark.SparkCatalog") \
              .config("spark.sql.catalog.aws_s3.type", "rest") \
              .config("spark.sql.catalog.aws_s3.uri", f"https://s3tables.{REGION}.amazonaws.com/iceberg") \
              .config("spark.sql.catalog.aws_s3.warehouse", TABLE_BUCKET_ARN) \
              .config("spark.sql.catalog.aws_s3.rest.sigv4-enabled", "true") \
              .config("spark.sql.catalog.aws_s3.rest.signing-name", "s3tables") \
              .config("spark.sql.catalog.aws_s3.rest.signing-region", REGION) \
              .config("spark.sql.catalog.aws_s3.io-impl", "org.apache.iceberg.aws.s3.S3FileIO") \
              .config("spark.sql.catalog.aws_s3.rest-metrics-reporting-enabled", "false") \
              .config("spark.sql.catalog.aws_s3.cache-enabled", "false") \
              .getOrCreate()

          spark.sql("USE aws_s3")

          # Read inventory
          inventory_df = spark.sql(f"""
              SELECT key, version_id, is_delete_marker,
                     CAST(last_modified_date AS TIMESTAMP) as last_modified_date,
                     size, storage_class, sequence_number
              FROM aws_s3.`{NAMESPACE}`.`{INVENTORY_TABLE}`
              WHERE key LIKE '{PREFIX_FILTER}%'
          """)

          # Read journal - find uncoalesced entries
          try:
              journal_time_df = spark.sql(f"""
                  SELECT COALESCE(
                      from_unixtime(CAST(value AS BIGINT)/1000) - INTERVAL 1 HOUR,
                      TIMESTAMP '2024-12-01 00:00:00'
                  ) AS inventory_time
                  FROM aws_s3.`{NAMESPACE}`.`{JOURNAL_TABLE}$properties`
                  WHERE key = 'aws.s3metadata.oldest-uncoalesced-record-timestamp'
              """)
              if journal_time_df.count() == 0:
                  raise Exception("No property found")
          except Exception:
              from pyspark.sql.types import StructType, StructField, TimestampType
              from datetime import datetime
              schema = StructType([StructField("inventory_time", TimestampType(), True)])
              journal_time_df = spark.createDataFrame([(datetime(2024, 12, 1),)], schema)

          inventory_time = journal_time_df.collect()[0]["inventory_time"]

          journal_df = spark.sql(f"""
              SELECT key, version_id, is_delete_marker,
                     CAST(last_modified_date AS TIMESTAMP) as last_modified_date,
                     size, storage_class,
                     CAST(record_timestamp AS TIMESTAMP) as record_timestamp,
                     record_type, sequence_number
              FROM aws_s3.`{NAMESPACE}`.`{JOURNAL_TABLE}`
              WHERE record_timestamp >= TIMESTAMP '{inventory_time}'
                AND key LIKE '{PREFIX_FILTER}%'
          """)

          # Permanent deletes from journal
          perm_deletes = journal_df.filter(
              (F.col("record_type") == "DELETE") & (F.coalesce(F.col("is_delete_marker"), F.lit(False)) == False)
          ).select("key", "version_id", "is_delete_marker", "record_timestamp", "sequence_number") \
           .withColumn("latest_delete_timestamp",
              F.first("record_timestamp").over(Window.partitionBy("key", "version_id").orderBy(F.col("sequence_number").desc()))) \
           .withColumn("latest_delete_sequence",
              F.max("sequence_number").over(Window.partitionBy("key", "version_id"))) \
           .drop("record_timestamp", "sequence_number") \
           .distinct()

          # Dummy deletes for NULL version_id overwrites
          null_vid_creates = journal_df.filter(
              (F.col("record_type") == "CREATE") & F.col("version_id").isNull()
          ).select(
              F.col("key"), F.col("version_id"),
              F.lit(False).alias("is_delete_marker"),
              F.col("last_modified_date").alias("latest_delete_timestamp"),
              F.concat(F.lit(" "), F.col("sequence_number")).alias("latest_delete_sequence")
          ).distinct()

          all_perm_deletes = perm_deletes.select("key", "version_id", "is_delete_marker",
              "latest_delete_timestamp", "latest_delete_sequence").union(null_vid_creates)

          # Deduplicate journal
          dedup_window = Window.partitionBy("key", "version_id", "is_delete_marker", "size", "last_modified_date") \
              .orderBy(F.col("sequence_number").desc())

          deduped = journal_df.filter(
              F.col("last_modified_date").isNotNull() &
              F.col("is_delete_marker").isNotNull() &
              F.col("size").isNotNull()
          ).withColumn("rn", F.row_number().over(dedup_window)) \
           .filter(F.col("rn") == 1).drop("rn")

          # Include records with nulls (permanent deletes etc)
          null_records = journal_df.filter(
              F.col("last_modified_date").isNull() |
              F.col("is_delete_marker").isNull() |
              F.col("size").isNull()
          )

          deduped_journal = deduped.unionByName(null_records, allowMissingColumns=True)

          # Filter journal: remove perm deletes, remove already-in-inventory
          journal_filtered = deduped_journal.alias("j") \
              .join(all_perm_deletes.alias("lpd"),
                  (F.col("j.key") == F.col("lpd.key")) &
                  (F.col("j.version_id").eqNullSafe(F.col("lpd.version_id"))),
                  "left") \
              .join(inventory_df.alias("inv"),
                  (F.col("j.key") == F.col("inv.key")) &
                  (F.col("j.version_id").eqNullSafe(F.col("inv.version_id"))),
                  "left") \
              .filter(
                  ~((F.col("j.record_type") == "DELETE") & (F.coalesce(F.col("j.is_delete_marker"), F.lit(False)) == False)) &
                  F.col("lpd.key").isNull() &
                  (F.col("inv.key").isNull() | ((F.col("j.record_type") == "CREATE") & F.col("j.version_id").isNull()))
              ) \
              .select(
                  F.col("j.key"), F.col("j.version_id"), F.col("j.last_modified_date"),
                  F.col("j.is_delete_marker"), F.col("j.size"), F.col("j.storage_class"),
                  F.col("j.sequence_number")
              )

          # Filter inventory against permanent deletes
          inventory_filtered = inventory_df.alias("i") \
              .join(all_perm_deletes.alias("lpd"),
                  (F.col("i.key") == F.col("lpd.key")) &
                  (F.col("i.version_id").eqNullSafe(F.col("lpd.version_id"))),
                  "left") \
              .filter(
                  F.col("lpd.key").isNull() |
                  ~(F.when(
                      F.col("lpd.latest_delete_timestamp") > F.col("i.last_modified_date") + F.expr("INTERVAL 1 SECOND"),
                      F.lit(True)
                  ).when(
                      (F.col("lpd.latest_delete_timestamp") >= F.col("i.last_modified_date") - F.expr("INTERVAL 1 SECOND")) &
                      (F.col("lpd.latest_delete_timestamp") <= F.col("i.last_modified_date") + F.expr("INTERVAL 1 SECOND")),
                      F.col("lpd.latest_delete_sequence") > F.col("i.sequence_number")
                  ).otherwise(F.lit(False)))
              ) \
              .select(
                  F.col("i.key"), F.col("i.version_id"), F.col("i.is_delete_marker"),
                  F.col("i.last_modified_date"), F.col("i.size"), F.col("i.storage_class"),
                  F.col("i.sequence_number")
              )

          # Coalesce inventory + journal
          coalesced = inventory_filtered.unionByName(journal_filtered)

          # Compute is_latest
          is_latest_window = Window.partitionBy("key").orderBy(F.col("sequence_number").desc())
          result = coalesced.withColumn("is_latest", F.row_number().over(is_latest_window) == 1)

          # Output with schema matching downstream Athena queries
          output = result.select(
              F.col("key"),
              F.col("version_id"),
              F.col("is_delete_marker"),
              F.col("is_latest"),
              F.col("last_modified_date"),
              F.col("size"),
              F.col("storage_class"),
              F.lit("").alias("intelligent_tiering_access_tier"),
              F.lit("").alias("dt")
          )

          output.write.mode("overwrite").parquet(OUTPUT_PATH)

          job.commit()
        - NameSpace: !GetAtt ExecuteMetadataFinder.NameSpace
          InventoryTable: !GetAtt ExecuteMetadataFinder.Inventory
          JournalTable: !GetAtt ExecuteMetadataFinder.Journal
          ResultsBucket: !Ref AthenaResultsBucket
          Prefix: !Ref Prefix


  # Step 3: Submit Glue Spark job (fire-and-forget)
  ExecuteGlueJob:
    Type: "Custom::ExecuteGlueJobFunction"
    DependsOn:
      - ExecuteSparkScriptUpload
      - GlueJobStateChangeRule
      - GlueJobSignalerPermission
    Properties:
      ServiceTimeout: 60
      ServiceToken: !GetAtt GlueJobSubmitter.Arn
      JobName: !Ref GlueJob
      JobArguments:
        "--JOB_NAME": !Ref GlueJob
        "--REGION": !Ref "AWS::Region"
        "--NAMESPACE": !GetAtt ExecuteMetadataFinder.NameSpace
        "--INVENTORY_TABLE": !GetAtt ExecuteMetadataFinder.Inventory
        "--JOURNAL_TABLE": !GetAtt ExecuteMetadataFinder.Journal
        "--OUTPUT_PATH": !Sub "s3://${AthenaResultsBucket}/Tables/pit_table/"
        "--PREFIX_FILTER": !If [WantPrefix, !Ref Prefix, "NONE"]

  # Step 4: Register PIT table in Glue (waits for Glue job via WaitCondition)
  ExecuteRegisterPITTable:
    Type: "Custom::ExecuteRegisterPITTableFunction"
    DependsOn:
      - GlueJobWaitCondition
      - ExecuteLFPermissionsGranter
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt RegisterPITTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/RegisterPITTable/"

  # Step 5: Downstream Athena queries (same dependency chain as original)
  ExecuteCreateAllVersionsTable:
    Type: "Custom::ExecuteCreateAllVersionsTableFunction"
    DependsOn:
      - ExecuteRegisterPITTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateAllVersionsTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateAllVersionsTable/"

  ExecuteCreateLatestVersionsTable:
    Type: "Custom::ExecuteCreateLatestVersionsTableFunction"
    Condition: WantRollback
    DependsOn:
      - ExecuteCreateAllVersionsTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateLatestVersionsTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateLatestVersionsTable/"

  ExecuteCreateDesiredTable:
    Type: "Custom::ExecuteCreateDesiredTableFunction"
    Condition: WantRollbackOrCopy
    DependsOn:
      - ExecuteCreateAllVersionsTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateDesiredTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateDesiredTable/"

  ExecuteCreateDesiredVersionsTable:
    Type: "Custom::ExecuteCreateDesiredVersionsTableFunction"
    Condition: WantRollbackOrCopy
    DependsOn:
      - ExecuteCreateDesiredTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateDesiredVersionsTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateDesiredVersionsTable/"


  ExecuteCreateChangedKeysTable:
    Type: "Custom::ExecuteCreateChangedKeysTableFunction"
    Condition: WantRollback
    DependsOn:
      - ExecuteCreateDesiredVersionsTable
      - ExecuteCreateLatestVersionsTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateChangedKeysTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateChangedKeysTable/"

  ExecuteCreateCountVersionsTable:
    Type: "Custom::ExecuteCreateCountVersionsTableFunction"
    Condition: WantRollback
    DependsOn:
      - ExecuteCreateAllVersionsTable
      - ExecuteCreateDesiredVersionsTable
      - ExecuteCreateLatestVersionsTable
    Properties:
      ServiceTimeout: 900
      ServiceToken: !GetAtt QueryExecutor.Arn
      QueryID: !GetAtt CreateCountVersionsTable.NamedQueryId
      WorkGroup: !Ref AthenaWorkGroup
      ResultsLocation: !Sub "s3://${AthenaResultsBucket}/Results/CreateCountVersionsTable/"

  ExecuteCreateLatestDMsTable:
    Type: "Custom::ExecuteCreateLatestDMsTableFunction"
    Condition: WantDMRemoval
